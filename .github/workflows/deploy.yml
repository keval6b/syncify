name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-2

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - uses: actions/checkout@v6

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY }}
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  build-layer:
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      id-token: write
      contents: read
    outputs:
      layer_arn: ${{ steps.layer.outputs.arn }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Build Lambda dependency layer
        working-directory: backend
        run: |
          uv export --no-dev --no-editable --no-emit-project -o /tmp/requirements.txt
          pip install -r /tmp/requirements.txt \
            --platform manylinux2014_aarch64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary=:all: \
            --target lambda_layer/python
          (cd lambda_layer && zip -r ../../lambda_layer.zip .)

      - name: Publish Lambda layer
        id: layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name syncify-deps \
            --zip-file fileb://lambda_layer.zip \
            --compatible-runtimes python3.13 \
            --compatible-architectures arm64 \
            --query LayerVersionArn --output text)
          echo "arn=$LAYER_ARN" >> "$GITHUB_OUTPUT"

  # Produce a plan and save it. This runs automatically so the diff is visible
  # before anyone approves the apply.
  plan:
    needs: [build-layer]
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_spotify_client_id: ${{ secrets.SPOTIPY_CLIENT_ID }}
      TF_VAR_spotify_client_secret: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
      TF_VAR_posthog_api_key: ${{ vars.POSTHOG_API_KEY }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_lambda_layer_arn: ${{ needs.build-layer.outputs.layer_arn }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.12.0"

      - name: OpenTofu plan
        working-directory: infra
        run: |
          tofu init -input=false
          tofu plan -input=false -out=tfplan

      - name: Render plan to job summary
        working-directory: infra
        run: |
          {
            echo '## Terraform plan'
            echo '```'
            tofu show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 5

  # Manual gate: the `prd-apply` environment has required reviewers, so this job
  # waits for approval. It applies the exact plan reviewed above (no re-plan).
  apply:
    needs: [plan, build-frontend]
    runs-on: ubuntu-latest
    environment: prd-apply
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: infra/

      - uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.12.0"

      - name: OpenTofu apply (saved plan)
        working-directory: infra
        run: |
          tofu init -input=false
          tofu apply -input=false tfplan

      - name: Sync frontend to S3
        working-directory: infra
        run: |
          BUCKET=$(tofu output -raw s3_bucket_name)
          aws s3 sync ../frontend/dist/ "s3://$BUCKET/" --delete

      - name: Invalidate CloudFront cache
        working-directory: infra
        run: |
          DIST_ID=$(tofu output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
